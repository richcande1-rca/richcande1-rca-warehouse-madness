<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Warehouse Madness</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <header>
      <div>WAREHOUSE MADNESS</div>
      <div id="status" class="small">Floor: 0/8</div>
    </header>

    <section id="doors"></section>
    <div id="rail"></div>

    <main id="floor">
      <div class="line l1"></div>
      <div class="line l2"></div>
      <div id="fork">
        <div id="load"></div>
        <div class="cab"></div>
        <div class="body"></div>
        <div class="forks"></div>
        <div class="wheel w1"></div>
        <div class="wheel w2"></div>
      </div>
    </main>

    <section id="pallets"></section>

    <footer>
      <div id="msg">Tap a pallet, then its matching dock door.</div>
      <div class="buttons">
        <button id="sound">SOUND: ON</button>
        <button id="restart">RESTART</button>
      </div>
    </footer>

    <div id="overlay">
      <div class="panel">
        <h1 id="title">Dock Door Dash</h1>
        <p id="intro">Tap a numbered pallet, then tap the matching dock door. Fill all four trailers before the staging floor jams up.</p>
        <p><b>Prototype:</b> 4 doors, 8 floor slots, one forklift.</p>
        <button id="start">START SHIFT</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
